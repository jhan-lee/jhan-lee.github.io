{% include base_path %}
{% assign post = include.post %}

<div class="achievement-entry">
  <div class="achievement-entry__image-wrap">
    <img class="achievement-entry__image" src="{{ post.image | relative_url }}" alt="{{ post.title | escape }}" />
  </div>
  <div class="achievement-entry__content">
    <p class="achievement-entry__title">{{ post.title }}</p>
  </div>
</div>
